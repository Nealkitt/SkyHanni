name: 'Gradle with resolution-error-only retry'
description: 'Run ./gradlew [...] and retry only on HTTP/resolution errors'
inputs:
    gradle-command:
        description: 'Arguments to pass to gradlew'
        required: false
        default: 'build --stacktrace'
    max-attempts:
        description: 'How many times to retry'
        required: false
        default: '3'
runs:
    using: composite
    steps:
        - name: Retryable Gradle
          shell: bash
          env:
              MAX_RETRIES: ${{ inputs.max-attempts }}
              GRADLE_CMD: ${{ inputs.gradle-command }}
          run: |
              chmod +x .github/scripts/gradlew-retry.kts
              # shellcheck disable=SC2086  # word-split intentional: gradle args are space-separated
              .github/scripts/gradlew-retry.kts $GRADLE_CMD
